# -------------------------------
# FLAIR Configuration (Flow CSV)
# WUSTL-IIoT: use the 23 Table III features
# -------------------------------

data:
  input_type: "flows_csv"          # we are NOT using packet preprocessing
  time_column: "StartTime"         # dataset column
  label_column: "Target"           # 0 = normal, 1 = attack
  class_column: "Traffic"          # optional (e.g., "normal", "DoS"); safe to ignore in code

# -------------------------------
# Features (exactly 23)
# NOTE: These names must match your CSV header exactly.
# -------------------------------

features:
  categorical:
    - Sport
    - Dport
    - Proto

  numeric:
    - Mean
    - SrcPkts
    - DstPkts
    - TotPkts
    - SrcBytes
    - DstBytes
    - TotBytes
    - SrcLoad
    - DstLoad
    - Load
    - SrcRate
    - DstRate
    - Rate
    - SrcLoss
    - DstLoss
    - Loss
    - pLoss
    - SrcJitter
    - DstJitter
    - SIntPkt
    - DIntPkt

# IMPORTANT (for Step 3 preprocessing):
# We will feed the model a single feature vector per flow row.
# Sport, Dport, Proto are categorical (embedded); 21 numeric features.
# input_dim = 24 total.

preprocess:
  window_size: 10                 # choose later; 10 is a reasonable start
  stride: 1                       # sliding window step
  sort_time: true                 # sort by StartTime before windowing
  dropna: true                    # drop rows with missing feature values
  # optional: if StartTime is a string, we will parse it in code

  # 80/10/10 train/eval/inference split of paths.full_csv_split, used by
  # `python scripts/preprocess_data.py --split`. Chronological (time-sorted)
  # so each window's rows stay within a single split.
  split_ratios: [0.8, 0.1, 0.1]

paths:
  # For now, point to your sample file so we can test the pipeline.
  # Later you will point this to the full giant CSV on the training machine.
  sample_xlsx: "src/data/DATASET_Sample_1000.xlsx"
  # full_csv: "PATH/TO/YOUR/GIANT.csv"

  # Full raw dataset for the 80/10/10 split (see preprocess.split_ratios above).
  # Kept separate from `full_csv` so `--split` mode never changes the default
  # preprocessed.npz used by the small-sample live demo.
  full_csv_split: "src/data/wustl_iiot_2021.csv"

  # If set, --split mode reuses this bundle's sport/dport/proto vocab and
  # mu/sigma instead of fitting fresh ones from full_csv_split. Required when
  # scoring the big dataset with an existing checkpoint (e.g. flair_minimal.pt)
  # so category IDs and numeric scaling match what that checkpoint was trained
  # on. Leave blank ("") to fit fresh stats (e.g. when training a new model on
  # the big dataset instead).
  vocab_reference_npz: "data/processed/preprocessed.npz"
  processed_train_npz: "data/processed/preprocessed_train.npz"
  processed_eval_npz: "data/processed/preprocessed_eval.npz"
  processed_inference_npz: "data/processed/preprocessed_inference.npz"

  processed_sequences_npy: "data/processed/sequences.npy"
  processed_seq_labels_npy: "data/processed/seq_labels.npy"
  processed_npz: "data/processed/preprocessed.npz"

dataset:
  dtype: "float32"
  return_targets: true

model:
  input_dim: 24
  hidden_dim: 64
  num_layers: 1
  dropout: 0.0
  bidirectional: false

training:
  batch_size: 32
  learning_rate: 0.001
  epochs: 32
  seed: 42
  device: "cpu"
  checkpoint_path: "experiments/results/flair_minimal.pt"

evaluation:
  threshold_percentile: 99
  output_csv: "experiments/results/anomaly_scores.csv"